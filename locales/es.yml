    message: "Falta sección de contexto del proyecto en el archivo de instrucciones GEMINI.md"
    suggestion: "Agrega una sección '# Project' o '## Overview' describiendo el propósito del proyecto y la tecnología"
  gm_004:
    message: "Configuración de hooks inválida: %{description}"
    suggestion: "Verifica los nombres de eventos de hooks y los campos requeridos (type, command) en .gemini/settings.json"
